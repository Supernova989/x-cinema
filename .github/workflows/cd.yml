name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/xcinema-backend:latest

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/xcinema-frontend:latest

  deploy:
    needs: publish

    runs-on:
      - self-hosted
      - Linux
      - ARM64

    steps:
      - name: Pull latest images
        working-directory: ${{ secrets.PI_WORKING_DIR }}
        run: docker compose pull

      - name: Restart containers
        working-directory: ${{ secrets.PI_WORKING_DIR }}
        run: docker compose up -d

      - name: Remove unused images
        run: docker image prune -f